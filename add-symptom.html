<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diet Diary — Add Symptom</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<header>
  <a href="index.html" class="brand">Diet Diary</a>
  <nav>
    <a href="entries.html">Entries</a>
    <a href="labels.html">Nutrition Labels</a>
  </nav>
</header>

<main style="max-width:620px">
  <a class="back" href="index.html" id="js-back">← Back</a>
  <h1 id="js-title">Add symptom</h1>

  <div class="toprow">
    <div class="tr-when" style="flex:1">
      <label>Date &amp; time</label>
      <input type="datetime-local" id="js-dt" />
    </div>
  </div>

  <div class="field">
    <label>Note</label>
    <textarea id="js-note" placeholder="Describe your symptom…"></textarea>
  </div>

  <div class="field">
    <label>Severity</label>
    <div class="severity-row">
      <button class="severity-btn" type="button" data-v="1">1</button>
      <button class="severity-btn" type="button" data-v="2">2</button>
      <button class="severity-btn" type="button" data-v="3">3</button>
      <button class="severity-btn" type="button" data-v="4">4</button>
      <button class="severity-btn" type="button" data-v="5">5</button>
    </div>
  </div>

  <div class="field">
    <label>Tags</label>
    <div class="tag-chips" id="js-tag-chips"></div>
    <div class="tag-add">
      <input type="text" id="js-tag-input" placeholder="Add a tag…" />
      <button class="btn" type="button" id="js-tag-add">Add</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary btn-lg" type="button" id="js-save">Save entry</button>
    <a class="btn btn-secondary btn-lg" href="index.html" id="js-cancel">Cancel</a>
  </div>
</main>

<footer>Diet Diary</footer>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const editId = params.get('id');

  let suggested = [];
  let customTags = [];
  let selectedTags = new Set();
  let selectedSeverity = null;

  const now = new Date();
  document.getElementById('js-dt').value =
    `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

  function setSeverity(v) {
    selectedSeverity = v;
    document.querySelectorAll('.severity-btn').forEach(btn => {
      btn.classList.toggle('active', Number(btn.dataset.v) === v);
    });
  }

  document.querySelector('.severity-row').addEventListener('click', e => {
    const btn = e.target.closest('.severity-btn');
    if (btn) setSeverity(Number(btn.dataset.v));
  });

  function makeChip(tag, description) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tag-chip' + (selectedTags.has(tag) ? ' active' : '');
    btn.dataset.tag = tag;
    btn.textContent = tag;
    if (description) btn.title = description;
    return btn;
  }

  function renderTags() {
    const chips = document.getElementById('js-tag-chips');
    chips.replaceChildren(
      ...suggested.map(({ name, description }) => makeChip(name, description)),
      ...customTags.map(t => makeChip(t))
    );
  }

  document.getElementById('js-tag-chips').addEventListener('click', e => {
    const chip = e.target.closest('.tag-chip');
    if (!chip) return;
    const tag = chip.dataset.tag;
    if (selectedTags.has(tag)) selectedTags.delete(tag);
    else selectedTags.add(tag);
    renderTags();
  });

  function addCustomTag() {
    const input = document.getElementById('js-tag-input');
    const tag = input.value.trim().toLowerCase();
    if (!tag) return;
    const suggestedNames = suggested.map(s => s.name);
    if (!suggestedNames.includes(tag) && !customTags.includes(tag)) customTags.push(tag);
    selectedTags.add(tag);
    input.value = '';
    renderTags();
  }

  document.getElementById('js-tag-add').addEventListener('click', addCustomTag);

  document.getElementById('js-tag-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addCustomTag(); }
  });

  function saveAndGo() {
    const dt = document.getElementById('js-dt').value;
    if (!dt) { alert('Please set the date and time.'); return; }
    saveEntry({
      id: editId || String(Date.now()),
      type: 'symptom',
      datetime: dt,
      note: document.getElementById('js-note').value.trim(),
      severity: selectedSeverity,
      tags: [...selectedTags]
    });
    location.href = 'entries.html';
  }

  document.getElementById('js-save').addEventListener('click', saveAndGo);

  fetch('data/symptoms.json')
    .then(r => r.json())
    .then(data => {
      suggested = data.symptoms;

      if (editId) {
        const existing = getEntry(editId);
        if (existing) {
          document.getElementById('js-title').textContent = 'Edit symptom';
          document.getElementById('js-dt').value = existing.datetime;
          document.getElementById('js-note').value = existing.note || '';
          if (existing.severity) setSeverity(existing.severity);
          if (existing.tags) {
            const suggestedNames = suggested.map(s => s.name);
            existing.tags.forEach(t => {
              if (!suggestedNames.includes(t)) customTags.push(t);
              selectedTags.add(t);
            });
          }
        }
        document.getElementById('js-back').href = 'entries.html';
        document.getElementById('js-cancel').href = 'entries.html';
      }

      renderTags();
    });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diet Diary</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<header>
  <div class="brand">Diet Diary</div>
  <nav>
    <a href="entries.html">Entries</a>
    <a href="labels.html">Nutrition Labels</a>
  </nav>
</header>

<main style="max-width:760px">
  <p class="date" id="js-date"></p>
  <h1>Today at a glance</h1>

  <div class="stats">
    <div class="stat"><div class="num" id="js-meals">0</div><div class="lbl">Meals</div></div>
    <div class="stat"><div class="num" id="js-snacks">0</div><div class="lbl">Snacks</div></div>
    <div class="stat"><div class="num" id="js-drinks">0</div><div class="lbl">Drinks</div></div>
    <div class="stat"><div class="num" id="js-cals">—</div><div class="lbl">Calories logged</div></div>
  </div>

  <div class="quick">
    <a class="btn" href="add-entry.html?type=meal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 2v7c0 1.1.9 2 2 2a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
      Add meal
    </a>
    <a class="btn" href="add-entry.html?type=snack">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06Z"/><path d="M10 2c1 .5 2 2 2 5"/></svg>
      Add snack
    </a>
    <a class="btn" href="add-entry.html?type=drink">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2h8l1 7H7L8 2Z"/><path d="M7 9c0 6 2 11 5 11s5-5 5-11"/></svg>
      Add drink
    </a>
    <a class="btn" href="add-symptom.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>
      Add symptom
    </a>
  </div>

  <div class="panel-head">
    <h2>Recent entries</h2>
    <a href="entries.html">View all →</a>
  </div>
  <div class="list" id="js-recent"></div>
</main>

<footer>Diet Diary</footer>
<script type="module">
import { getEntries } from './js/store.js';
import { loadCatalog, entrySummary, dayCalories } from './js/catalog.js';
import { pad, esc, formatTime } from './js/ui.js';

(function () {
  const now = new Date();
  const todayPrefix = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;

  document.getElementById('js-date').textContent = now.toLocaleDateString('en-CA', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  async function render() {
    await loadCatalog();
    const all = getEntries();
    const today = all.filter(e => e.datetime && e.datetime.startsWith(todayPrefix));

    const meals = today.filter(e => e.type === 'meal').length;
    const snacks = today.filter(e => e.type === 'snack').length;
    const drinks = today.filter(e => e.type === 'drink').length;
    const cals = dayCalories(today);

    document.getElementById('js-meals').textContent = meals;
    document.getElementById('js-snacks').textContent = snacks;
    document.getElementById('js-drinks').textContent = drinks;
    document.getElementById('js-cals').textContent = cals.has ? `~${cals.total}` : '—';

    const recent = [...all]
      .sort((a, b) => b.datetime.localeCompare(a.datetime))
      .slice(0, 5);

    const list = document.getElementById('js-recent');
    if (!recent.length) {
      list.innerHTML = '<p class="empty">No entries yet — add your first meal, snack, drink, or symptom!</p>';
      return;
    }

    list.innerHTML = recent.map(e => {
      const { name, sub } = entrySummary(e);
      const badgeCls = e.type === 'symptom' ? 'badge symptom' : 'badge';
      const label = e.type.charAt(0).toUpperCase() + e.type.slice(1);
      return `<div class="item">
        <span class="time">${formatTime(e.datetime)}</span>
        <div>
          <div class="name">${esc(name)}</div>
          ${sub ? `<div class="sub">${esc(sub)}</div>` : ''}
        </div>
        <span class="${badgeCls}">${label}</span>
      </div>`;
    }).join('');
  }

  render();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diet Diary — Nutrition Labels</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .label {
    background: #fff;
    border: 2px solid #000;
    padding: 14px 16px;
    width: 360px;
    box-sizing: border-box;
    line-height: 1.25;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }
  .label.dual { width: 420px; }
  .label-title {
    font-size: 26px;
    font-weight: 800;
    line-height: 1.05;
    margin: 0;
  }
  .label-title .fr {
    display: block;
    font-style: italic;
    font-weight: 800;
  }
  .serving {
    font-size: 14px;
    margin: 6px 0 0;
  }
  .serving .fr {
    display: block;
    font-style: italic;
  }
  .serving-note {
    font-size: 13px;
    margin-top: 4px;
  }
  .serving-note .fr {
    display: block;
    font-style: italic;
  }
  hr.thick {
    border: 0;
    border-top: 8px solid #000;
    margin: 8px 0;
  }
  hr.medium {
    border: 0;
    border-top: 4px solid #000;
    margin: 6px 0;
  }
  hr.thin {
    border: 0;
    border-top: 1px solid #000;
    margin: 4px 0;
  }
  .nrow {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 2px 0;
    font-size: 14px;
  }
  .nrow .name { flex: 1; }
  .nrow .name .fr { font-style: italic; }
  .nrow .dv-group {
    display: flex;
    margin-left: 12px;
  }
  .nrow .dv-cell {
    font-weight: 700;
    white-space: nowrap;
    text-align: right;
    min-width: 52px;
  }
  .nrow .dv-cell + .dv-cell { margin-left: 8px; }
  .calories-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 2px 0;
  }
  .calories-row .left {
    font-weight: 800;
    font-size: 22px;
  }
  .calories-row .right {
    text-align: right;
    font-size: 11px;
    line-height: 1.15;
  }
  .calories-row .right .fr {
    display: block;
    font-style: italic;
  }
  .calories-row.dual {
    align-items: baseline;
  }
  .calories-row.dual .cal-cell {
    font-weight: 800;
    font-size: 22px;
    text-align: right;
    min-width: 52px;
  }
  .calories-row.dual .cal-cell + .cal-cell { margin-left: 8px; }
  .column-headers {
    display: flex;
    justify-content: flex-end;
    font-size: 11px;
    line-height: 1.15;
    padding: 2px 0;
  }
  .column-headers .col {
    min-width: 52px;
    text-align: right;
  }
  .column-headers .col + .col { margin-left: 8px; }
  .column-headers .fr {
    display: block;
    font-style: italic;
  }
  .dv-header {
    text-align: right;
    font-size: 11px;
    line-height: 1.15;
    padding: 2px 0 4px;
  }
  .dv-header .fr { font-style: italic; }
  .nbold { font-weight: 700; }
  .indent-1 { padding-left: 16px; }
  .indent-2 { padding-left: 32px; }
  .footnote {
    font-size: 11px;
    line-height: 1.3;
    margin-top: 6px;
  }
  .footnote .fr {
    display: block;
    font-style: italic;
  }
  .footnote .little { font-weight: 700; }
  .footnote .alot { font-weight: 700; }
  #js-label { margin-top: 24px; }
  .foodcard.kbfocus { border-color: #a99f88; background: #faf8f4; }
</style>
</head>
<body>
<header>
  <div class="brand">Diet Diary</div>
  <nav>
    <a href="entries.html">Entries</a>
    <a href="labels.html" class="active">Nutrition Labels</a>
  </nav>
</header>

<main style="max-width:620px">
  <h1>Nutrition Labels</h1>

  <div class="field">
    <input class="search" type="search" id="js-search" placeholder="Search products…" oninput="filterCatalog()" />
    <div class="catalog" id="js-catalog"></div>
  </div>

  <div id="js-label"></div>
</main>

<footer>Diet Diary</footer>
<script>
(function () {
  let allProducts = [];
  let selectedId = null;
  let currentProducts = [];
  let highlightIdx = -1;

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function fmt(n) {
    return Number.isInteger(n) ? n : n.toString();
  }

  function servingLabel(p) {
    return p.serving.fraction ? `${p.serving.fraction} · ${p.serving.grams} g` : `${p.serving.grams} g`;
  }

  function calLabel(p) {
    const c = Array.isArray(p.calories) ? p.calories[0] : p.calories;
    return `${c} cal`;
  }

  function renderCatalog(products) {
    currentProducts = products;
    document.getElementById('js-catalog').innerHTML = products.map((p, i) => {
      const sel = selectedId === p.id ? ' selected' : '';
      const hl  = i === highlightIdx ? ' kbfocus' : '';
      return `<div class="foodcard${sel}${hl}" onclick="selectProduct('${p.id}')">
        <span class="radio"></span>
        <div class="body"><div class="nm">${esc(p.name)}</div><div class="sv">${esc(servingLabel(p))}</div></div>
        <span class="cal">${calLabel(p)}</span>
      </div>`;
    }).join('');
    if (highlightIdx >= 0) {
      const cards = document.querySelectorAll('#js-catalog .foodcard');
      if (cards[highlightIdx]) cards[highlightIdx].scrollIntoView({ block: 'nearest' });
    }
  }

  window.filterCatalog = function () {
    const q = document.getElementById('js-search').value.toLowerCase().trim();
    selectedId = null;
    highlightIdx = -1;
    document.getElementById('js-label').innerHTML = '';
    if (!q) { currentProducts = []; document.getElementById('js-catalog').innerHTML = ''; return; }
    renderCatalog(allProducts.filter(p => p.name.toLowerCase().includes(q)));
  };

  function previewProduct(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    document.getElementById('js-label').innerHTML = '';
    document.getElementById('js-label').appendChild(buildLabel(p));
  }

  window.selectProduct = function (id) {
    selectedId = id;
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    document.getElementById('js-search').value = p.name;
    document.getElementById('js-catalog').innerHTML = '';
    currentProducts = [];
    highlightIdx = -1;
    previewProduct(id);
  };

  // ── Label rendering ───────────────────────────────────────────────────────

  function nrow({ name, fr, amount, unit, dv, bold, indent, columnCount }) {
    const div = document.createElement('div');
    div.className = 'nrow';
    if (indent === 1) div.classList.add('indent-1');
    if (indent === 2) div.classList.add('indent-2');
    const left = document.createElement('div');
    left.className = 'name';
    const nameSpan = document.createElement('span');
    if (bold) nameSpan.classList.add('nbold');
    nameSpan.textContent = name;
    left.appendChild(nameSpan);
    if (fr) {
      const frSpan = document.createElement('span');
      if (bold) frSpan.classList.add('nbold');
      frSpan.innerHTML = ` / <span class="fr">${fr}</span>`;
      left.appendChild(frSpan);
    }
    const amtSpan = document.createElement('span');
    amtSpan.textContent = amount != null ? ` ${fmt(amount)} ${unit}` : '';
    if (bold && amount != null) amtSpan.classList.add('nbold');
    left.appendChild(amtSpan);

    const cols = columnCount || 1;
    const dvs = Array.isArray(dv) ? dv : (dv != null ? [dv] : []);
    const right = document.createElement('div');
    right.className = 'dv-group';
    for (let i = 0; i < cols; i++) {
      const cell = document.createElement('div');
      cell.className = 'dv-cell';
      cell.textContent = dvs[i] != null ? `${dvs[i]} %` : '';
      right.appendChild(cell);
    }
    div.appendChild(left);
    div.appendChild(right);
    return div;
  }

  function hr(kind) {
    const h = document.createElement('hr');
    h.className = kind;
    return h;
  }

  function buildLabel(p) {
    const wrapper = document.createElement('div');

    const columns = p.columns || null;
    const cols = columns ? columns.length : 1;

    const el = document.createElement('div');
    el.className = 'label' + (cols > 1 ? ' dual' : '');
    wrapper.appendChild(el);

    const title = document.createElement('div');
    title.className = 'label-title';
    title.innerHTML = `Nutrition Facts<span class="fr">Valeur nutritive</span>`;
    el.appendChild(title);

    const serving = document.createElement('div');
    serving.className = 'serving';
    const frServing = p.serving.fractionFr || p.serving.fraction;
    serving.innerHTML = `Per ${p.serving.fraction} (${p.serving.grams} g)<span class="fr">pour ${frServing} (${p.serving.grams} g)</span>`;
    el.appendChild(serving);

    if (p.servingNote) {
      const note = document.createElement('div');
      note.className = 'serving-note';
      const noteFr = p.servingNoteFr ? `<span class="fr">${p.servingNoteFr}</span>` : '';
      note.innerHTML = `${p.servingNote}${noteFr}`;
      el.appendChild(note);
    }

    el.appendChild(hr('thick'));

    if (cols > 1) {
      const ch = document.createElement('div');
      ch.className = 'column-headers';
      let html = '';
      columns.forEach(c => {
        const cFr = c.labelFr ? `<span class="fr">${c.labelFr}</span>` : '';
        html += `<div class="col">${c.label}${cFr}</div>`;
      });
      ch.innerHTML = html;
      el.appendChild(ch);
    }

    const cal = document.createElement('div');
    cal.className = 'calories-row' + (cols > 1 ? ' dual' : '');
    if (cols > 1) {
      const calArr = Array.isArray(p.calories) ? p.calories : [p.calories];
      let cells = '';
      for (let i = 0; i < cols; i++) {
        cells += `<div class="cal-cell">${calArr[i] != null ? calArr[i] : ''}</div>`;
      }
      cal.innerHTML = `<div class="left">Calories</div>${cells}`;
    } else {
      cal.innerHTML = `
        <div class="left">Calories ${p.calories}</div>
        <div class="right">% Daily Value*<span class="fr">% valeur quotidienne*</span></div>
      `;
    }
    el.appendChild(cal);

    el.appendChild(hr('medium'));

    if (cols > 1) {
      const dvh = document.createElement('div');
      dvh.className = 'dv-header';
      dvh.innerHTML = `% Daily Value* / <span class="fr">% valeur quotidienne*</span>`;
      el.appendChild(dvh);
    }

    const n = p.nutrients;
    const cc = cols;

    el.appendChild(nrow({ name: 'Total Fat', fr: 'Lipides', amount: n.totalFat.amount, unit: n.totalFat.unit, dv: n.totalFat.dv, bold: true, columnCount: cc }));
    el.appendChild(nrow({ name: 'Saturated', fr: 'saturés', amount: n.saturatedFat.amount, unit: n.saturatedFat.unit, dv: n.saturatedFat.dv, indent: 1, columnCount: cc }));
    el.appendChild(nrow({ name: '+ Trans', fr: 'trans', amount: n.transFat.amount, unit: n.transFat.unit, indent: 1, columnCount: cc }));

    el.appendChild(hr('thin'));

    el.appendChild(nrow({ name: 'Carbohydrate', fr: 'Glucides', amount: n.carbohydrate.amount, unit: n.carbohydrate.unit, bold: true, columnCount: cc }));
    el.appendChild(nrow({ name: 'Fiber', fr: 'Fibres', amount: n.fiber.amount, unit: n.fiber.unit, dv: n.fiber.dv, indent: 1, columnCount: cc }));
    el.appendChild(nrow({ name: 'Sugars', fr: 'Sucres', amount: n.sugars.amount, unit: n.sugars.unit, dv: n.sugars.dv, indent: 1, columnCount: cc }));

    el.appendChild(hr('thin'));

    el.appendChild(nrow({ name: 'Protein', fr: 'Protéines', amount: n.protein.amount, unit: n.protein.unit, bold: true, columnCount: cc }));

    el.appendChild(hr('thin'));

    el.appendChild(nrow({ name: 'Cholesterol', fr: 'Cholestérol', amount: n.cholesterol.amount, unit: n.cholesterol.unit, bold: true, columnCount: cc }));

    el.appendChild(hr('thin'));

    el.appendChild(nrow({ name: 'Sodium', amount: n.sodium.amount, unit: n.sodium.unit, dv: n.sodium.dv, bold: true, columnCount: cc }));

    el.appendChild(hr('medium'));

    el.appendChild(nrow({ name: 'Potassium', amount: n.potassium.amount, unit: n.potassium.unit, dv: n.potassium.dv, columnCount: cc }));

    el.appendChild(hr('thin'));

    el.appendChild(nrow({ name: 'Calcium', amount: n.calcium.amount, unit: n.calcium.unit, dv: n.calcium.dv, columnCount: cc }));

    el.appendChild(hr('thin'));

    el.appendChild(nrow({ name: 'Iron', fr: 'Fer', amount: n.iron.amount, unit: n.iron.unit, dv: n.iron.dv, columnCount: cc }));

    el.appendChild(hr('medium'));

    const fn = document.createElement('div');
    fn.className = 'footnote';
    fn.innerHTML = `
      * 5% or less is <span class="little">a little</span>, 15% or more is <span class="alot">a lot</span>
      <span class="fr">* 5 % ou moins c'est <span class="little">peu</span>, 15 % ou plus c'est <span class="alot">beaucoup</span></span>
    `;
    el.appendChild(fn);

    return wrapper;
  }

  document.getElementById('js-search').addEventListener('keydown', function (e) {
    if (!currentProducts.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      highlightIdx = Math.min(highlightIdx + 1, currentProducts.length - 1);
      renderCatalog(currentProducts);
      previewProduct(currentProducts[highlightIdx].id);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      highlightIdx = Math.max(highlightIdx - 1, 0);
      renderCatalog(currentProducts);
      previewProduct(currentProducts[highlightIdx].id);
    } else if (e.key === 'Enter' && highlightIdx >= 0) {
      selectProduct(currentProducts[highlightIdx].id);
    }
  });

  async function load() {
    const res = await fetch('nutrition.json');
    const data = await res.json();
    allProducts = data.products;
  }

  load();
})();
</script>
</body>
</html>

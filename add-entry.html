<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diet Diary — Add Entry</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div class="brand">Diet Diary</div>
  <nav>
    <a href="entries.html">Entries</a>
    <a href="labels.html">Nutrition Labels</a>
  </nav>
</header>

<main style="max-width:620px">
  <a class="back" href="index.html" id="js-back">← Back</a>
  <h1 id="js-title">Add meal</h1>

  <div class="toprow">
    <div class="tr-type">
      <label>Type</label>
      <div class="segmented">
        <button type="button" id="btn-meal" onclick="setType('meal')">Meal</button>
        <button type="button" id="btn-snack" onclick="setType('snack')">Snack</button>
      </div>
    </div>
    <div class="tr-when">
      <label>Date &amp; time</label>
      <input type="datetime-local" id="js-dt" />
    </div>
  </div>

  <div class="field">
    <label>Choose food</label>
    <input class="search" type="search" id="js-search" placeholder="Search the nutrition catalog…" oninput="filterCatalog()" />
    <div class="catalog" id="js-catalog"></div>
  </div>

  <div class="field" id="js-custom-field" style="display:none">
    <label>Food name</label>
    <input type="text" id="js-custom-name" placeholder="What did you eat?" />
  </div>

  <div class="field">
    <label>Quantity <span class="hint">(optional)</span></label>
    <div class="qty-row">
      <select id="js-qty-kind" onchange="updateUnit()">
        <option value="weight">Weight</option>
        <option value="volume">Volume</option>
        <option value="number">Number</option>
      </select>
      <input type="number" id="js-qty-value" placeholder="Amount" min="0" step="any" />
      <select id="js-qty-unit"></select>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary btn-lg" type="button" onclick="saveAndGo()">Save entry</button>
    <a class="btn btn-secondary btn-lg" href="index.html" id="js-cancel">Cancel</a>
  </div>
</main>

<footer>Diet Diary</footer>
<script src="store.js"></script>
<script src="catalog.js"></script>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const editId = params.get('id');
  let currentType = params.get('type') === 'snack' ? 'snack' : 'meal';
  let selectedProductId = null;
  let allProducts = [];

  const pad = n => String(n).padStart(2, '0');
  const now = new Date();
  document.getElementById('js-dt').value =
    `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

  const UNIT_OPTIONS = { weight: ['g', 'lb'], volume: ['ml', 'cups'], number: null };

  window.updateUnit = function (preserveValue) {
    const kind = document.getElementById('js-qty-kind').value;
    const sel = document.getElementById('js-qty-unit');
    const opts = UNIT_OPTIONS[kind];
    if (!opts) {
      sel.disabled = true;
      sel.innerHTML = '<option value="">—</option>';
    } else {
      const prev = preserveValue && sel.value;
      sel.disabled = false;
      sel.innerHTML = opts.map(u => `<option value="${u}">${u}</option>`).join('');
      if (prev && opts.includes(prev)) sel.value = prev;
    }
  };

  window.setType = function (t) {
    currentType = t;
    document.getElementById('btn-meal').classList.toggle('active', t === 'meal');
    document.getElementById('btn-snack').classList.toggle('active', t === 'snack');
    if (!editId) document.getElementById('js-title').textContent = `Add ${t}`;
  };
  setType(currentType);

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function servingLabel(p) {
    return p.serving.fraction ? `${p.serving.fraction} · ${p.serving.grams} g` : `${p.serving.grams} g`;
  }

  function calLabel(p) {
    const c = Array.isArray(p.calories) ? p.calories[0] : p.calories;
    return `${c} cal`;
  }

  function renderCatalog(products) {
    const rows = products.map(p => {
      const sel = selectedProductId === p.id ? ' selected' : '';
      return `<div class="foodcard${sel}" onclick="selectProduct('${p.id}')">
        <span class="radio"></span>
        <div class="body"><div class="nm">${esc(p.name)}</div><div class="sv">${esc(servingLabel(p))}</div></div>
        <span class="cal">${calLabel(p)}</span>
      </div>`;
    }).join('');

    const customSel = selectedProductId === '__custom__' ? ' selected' : '';
    document.getElementById('js-catalog').innerHTML = rows +
      `<div class="foodcard custom${customSel}" onclick="selectCustom()">
        <span class="radio"></span>
        <div class="body"><div class="nm">Something else — type it in</div></div>
      </div>`;
  }

  window.selectProduct = function (id) {
    selectedProductId = id;
    document.getElementById('js-custom-field').style.display = 'none';
    const p = allProducts.find(x => x.id === id);
    if (p) {
      const qtyVal = document.getElementById('js-qty-value');
      if (!qtyVal.value) {
        document.getElementById('js-qty-kind').value = 'weight';
        updateUnit();
        qtyVal.value = p.serving.grams;
      }
    }
    renderCatalog(filteredProducts());
  };

  window.selectCustom = function () {
    selectedProductId = '__custom__';
    document.getElementById('js-custom-field').style.display = '';
    document.getElementById('js-custom-name').focus();
    renderCatalog(filteredProducts());
  };

  function filteredProducts() {
    const q = document.getElementById('js-search').value.toLowerCase().trim();
    return q ? allProducts.filter(p => p.name.toLowerCase().includes(q)) : allProducts;
  }

  window.filterCatalog = function () {
    renderCatalog(filteredProducts());
  };

  window.saveAndGo = function () {
    const dt = document.getElementById('js-dt').value;
    if (!dt) { alert('Please set the date and time.'); return; }

    let name, productId;
    if (selectedProductId && selectedProductId !== '__custom__') {
      const p = allProducts.find(x => x.id === selectedProductId);
      name = p ? p.name : '';
      productId = selectedProductId;
    } else {
      name = document.getElementById('js-custom-name').value.trim();
      if (!name) { alert('Please choose a food or enter a name.'); return; }
      productId = null;
    }

    const qtyValue = document.getElementById('js-qty-value').value;
    const qtyKind = document.getElementById('js-qty-kind').value;
    const qtyUnit = qtyKind === 'number' ? '' : document.getElementById('js-qty-unit').value;
    const quantity = qtyValue
      ? { kind: qtyKind, value: Number(qtyValue), unit: qtyUnit }
      : null;

    saveEntry({
      id: editId || crypto.randomUUID(),
      type: currentType,
      datetime: dt,
      name,
      productId,
      quantity,
      note: ''
    });
    location.href = 'entries.html';
  };

  async function init() {
    updateUnit();
    allProducts = await loadCatalog();

    if (editId) {
      const existing = getEntry(editId);
      if (existing) {
        currentType = existing.type === 'snack' ? 'snack' : 'meal';
        setType(currentType);
        document.getElementById('js-title').textContent = `Edit ${currentType}`;
        document.getElementById('js-dt').value = existing.datetime;
        if (existing.productId) {
          selectedProductId = existing.productId;
        } else {
          selectedProductId = '__custom__';
          document.getElementById('js-custom-field').style.display = '';
          document.getElementById('js-custom-name').value = existing.name || '';
        }
        if (existing.quantity) {
          document.getElementById('js-qty-kind').value = existing.quantity.kind || 'weight';
          updateUnit();
          document.getElementById('js-qty-value').value = existing.quantity.value || '';
          if (existing.quantity.kind !== 'number') {
            document.getElementById('js-qty-unit').value = existing.quantity.unit || '';
          }
        }
      }
      document.getElementById('js-back').href = 'entries.html';
      document.getElementById('js-cancel').href = 'entries.html';
    }

    renderCatalog(allProducts);
  }

  init();
})();
</script>
</body>
</html>
